<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Elle Levantamento</title>
  <!-- Inter: carrega se houver internet; sistema (Helvetica/Roboto) se não houver -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'">
<style>
/* ═══════════════════════════════════════════
   Elle Levantamento — Design System
   Dark professional architectural tool
   ═══════════════════════════════════════════ */

/* ── Tokens ── */
:root {
  --bg:           #1A1814;
  --surface:      #2C2218;
  --surface-2:    #3D3226;
  --surface-3:    #4A3F32;
  --accent:       #C9A84C;
  --accent-dim:   rgba(201, 168, 76, 0.12);
  --accent-glow:  rgba(201, 168, 76, 0.06);
  --text:         #F5F0E8;
  --text-muted:   #A89880;
  --text-faint:   #6B5D4F;
  --border:       #3D3226;
  --border-soft:  #2C2218;
  --red:          #C05050;
  --green:        #5A9A70;
  --blue:         #5B9BD5;
  --radius-sm:    6px;
  --radius-md:    10px;
  --radius-lg:    14px;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.65);
  --font:         'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition:   0.15s ease;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#app { height: 100vh; overflow: hidden; }

button { font-family: var(--font); }
strong { font-weight: 600; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }
* { scrollbar-width: thin; scrollbar-color: var(--surface-2) transparent; }

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */

.dashboard {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 16px;
}

.dash-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dash-logo-text {
  font-size: 15px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.03em;
}

.dash-logo-text strong {
  font-weight: 700;
  color: var(--accent);
}

.dash-main {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
}

/* ── Project Grid ── */
.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  max-width: 1200px;
}

/* ── Project Card ── */
.proj-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
}

.proj-card:hover {
  border-color: var(--surface-3);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.proj-card-thumb {
  height: 148px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.proj-thumb-placeholder {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.proj-thumb-initials {
  position: absolute;
  font-size: 32px;
  font-weight: 700;
  color: var(--surface-3);
  letter-spacing: 0.08em;
  user-select: none;
}

.proj-card-body { padding: 14px 16px 16px; }

.proj-card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.proj-card-client {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}

.proj-card-address {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.proj-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  color: var(--text-faint);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.proj-card-actions {
  display: flex;
  gap: 6px;
}

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 130px);
  text-align: center;
  gap: 10px;
}

.empty-icon { opacity: 0.35; margin-bottom: 4px; }
.empty-title { font-size: 15px; font-weight: 500; color: var(--text-muted); }
.empty-sub { font-size: 12px; color: var(--text-faint); }

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  background: var(--accent);
  color: #1A1814;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition), background var(--transition);
  white-space: nowrap;
}
.btn-ghost:hover {
  color: var(--text);
  border-color: var(--surface-3);
  background: var(--surface-2);
}

.btn-card-primary {
  flex: 1;
  padding: 7px 0;
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(201, 168, 76, 0.18);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}
.btn-card-primary:hover { background: rgba(201, 168, 76, 0.2); }

.btn-card-icon {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 7px 11px;
  background: var(--surface-2);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: color var(--transition), background var(--transition), border-color var(--transition);
}
.btn-card-icon:hover { color: var(--text); background: var(--surface-3); }

.btn-card-icon.btn-danger:hover {
  color: var(--red);
  border-color: rgba(192, 80, 80, 0.35);
  background: rgba(192, 80, 80, 0.1);
}

.btn-danger-solid {
  padding: 8px 18px;
  background: rgba(192, 80, 80, 0.12);
  color: #E07070;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid rgba(192, 80, 80, 0.3);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--transition);
}
.btn-danger-solid:hover { background: rgba(192, 80, 80, 0.22); }

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.2s;
  padding: 20px;
}
.modal-backdrop.visible { opacity: 1; }

.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 480px;
  padding: 26px;
  box-shadow: var(--shadow-lg);
  transform: translateY(10px);
  transition: transform 0.2s;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
}
.modal-backdrop.visible .modal-box { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.modal-title { font-size: 17px; font-weight: 600; color: var(--text); }

.modal-close {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: none; border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  transition: color var(--transition), background var(--transition);
}
.modal-close:hover { color: var(--text); background: var(--surface-2); }

.modal-body { margin-bottom: 22px; }

.confirm-text { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
.confirm-sub { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; }

/* ── Form ── */
.modal-form { display: flex; flex-direction: column; }
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 7px;
}
.required { color: var(--accent); }

.form-input {
  width: 100%;
  padding: 10px 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color var(--transition);
  -webkit-user-select: text;
  user-select: text;
}
.form-input::placeholder { color: var(--text-faint); }
.form-input:focus { border-color: var(--accent); }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */

#toast-root {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 7px;
  pointer-events: none;
}

.toast {
  padding: 11px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text);
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateX(10px);
  transition: opacity 0.2s, transform 0.2s;
  max-width: 280px;
}
.toast.visible { opacity: 1; transform: translateX(0); }
.toast-success { border-color: rgba(90, 154, 112, 0.45); color: #8DBA9F; }
.toast-error   { border-color: rgba(192, 80, 80, 0.45); color: #E08888; }
.toast-info    { border-color: var(--border); }

/* ══════════════════════════════════════════
   CANVAS EDITOR
══════════════════════════════════════════ */

.canvas-editor {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Editor Header ── */
.editor-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.editor-project-info { flex: 1; min-width: 0; }

.editor-project-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.editor-project-sub {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

/* ── Toolbar ── */
.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.tool-group {
  display: flex;
  align-items: center;
  gap: 2px;
}

.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 13px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  cursor: pointer;
  transition: color var(--transition), background var(--transition), border-color var(--transition);
  min-width: 54px;
  min-height: 44px;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.tool-btn:hover { color: var(--text); background: var(--surface-2); }
.tool-btn.active {
  color: var(--accent);
  background: var(--accent-dim);
  border-color: rgba(201, 168, 76, 0.22);
}

.tool-sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

/* ── Editor Body ── */
.editor-body {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#main-canvas {
  position: absolute;
  inset: 0;
  display: block;
  touch-action: none;
}

/* ── Properties Sidebar ── */
.editor-sidebar {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 240px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sidebar-section-title {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 8px;
}

.prop-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 12px;
}

.prop-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
}

.prop-input {
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  width: 100%;
  transition: border-color var(--transition);
  -webkit-user-select: text;
  user-select: text;
}
.prop-input:focus { border-color: var(--accent); }

/* ── Hud / Overlays ── */
.hud-scale {
  position: absolute;
  bottom: 14px;
  left: 14px;
  background: rgba(44, 34, 24, 0.88);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 10px;
  color: var(--text-muted);
  pointer-events: none;
  backdrop-filter: blur(4px);
  z-index: 5;
}

.hud-coords {
  position: absolute;
  bottom: 14px;
  left: 120px;
  background: rgba(44, 34, 24, 0.88);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 10px;
  color: var(--text-faint);
  pointer-events: none;
  backdrop-filter: blur(4px);
  z-index: 5;
  font-variant-numeric: tabular-nums;
}

.hud-hint {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(44, 34, 24, 0.92);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11px;
  color: var(--text-muted);
  pointer-events: none;
  backdrop-filter: blur(4px);
  z-index: 5;
  white-space: nowrap;
}

.hud-btn-group {
  position: absolute;
  bottom: 14px;
  right: 254px;
  display: flex;
  gap: 8px;
  z-index: 5;
}

.hud-nav-btn {
  width: 46px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(44, 34, 24, 0.92);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 24px;
  font-weight: 400;
  line-height: 1;
  cursor: pointer;
  backdrop-filter: blur(4px);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--transition), border-color var(--transition);
}
.hud-nav-btn:hover { background: var(--surface-2); }
.hud-nav-btn:active { background: var(--accent-dim); border-color: rgba(201, 168, 76, 0.4); }

/* ── Teclado numérico ── */
.numpad { width: 280px; max-width: 86vw; }
.numpad-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.numpad-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.numpad-display {
  display: flex;
  align-items: baseline;
  justify-content: flex-end;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 12px;
  min-height: 30px;
}
.numpad-display #np-val {
  font-size: 28px;
  font-weight: 600;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.numpad-unit { font-size: 14px; color: var(--text-muted); }
.numpad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.np-key {
  height: 56px;
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--transition);
}
.np-key:active { background: var(--accent-dim); border-color: rgba(201, 168, 76, 0.4); }
.np-back { color: var(--text-muted); font-size: 20px; }
.numpad-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.numpad-actions button { flex: 1; justify-content: center; }

/* ── Formulário de abertura (porta/janela) ── */
.op-input-wrap { position: relative; display: flex; align-items: center; }
.op-num { padding-right: 38px; }
.op-input-wrap .op-unit {
  position: absolute;
  right: 12px;
  font-size: 12px;
  color: var(--text-muted);
  pointer-events: none;
}
.op-seg {
  display: flex;
  gap: 6px;
}
.op-seg button {
  flex: 1;
  padding: 9px 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.op-seg button.active {
  color: var(--accent);
  background: var(--accent-dim);
  border-color: rgba(201, 168, 76, 0.4);
}

.op-flip {
  width: 100%;
  margin: -6px 0 4px;
  padding: 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  touch-action: manipulation;
}
.op-flip:active { background: var(--surface-2); }

/* Valor sugerido no teclado (some ao 1º toque) */
.np-suggest { opacity: 0.45; }
.np-clear { color: var(--text-muted); }

/* ── Ações flutuantes do desenho de parede ── */
.wall-actions {
  position: absolute;
  bottom: 60px;
  left: 14px;
  display: flex;
  gap: 8px;
  z-index: 6;
}
.wall-act-btn {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  background: rgba(44, 34, 24, 0.95);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  backdrop-filter: blur(4px);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.wall-act-done {
  color: #1A1814;
  background: var(--accent);
  border-color: var(--accent);
}

/* ── Save indicator ── */
.save-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text-faint);
  white-space: nowrap;
}

.save-dot {
  width: 6px;
  height: 6px;

/* ═══════════════════════════════════════════
   Elle Levantamento — Data Layer & Storage

const SCHEMA_VERSION = 1;

// ── ID Generator ──────────────────────────────

function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ── Utilitário de parse PT-BR ─────────────────
// Suporta todos os formatos que chegam de teclado em campo:
//   "1,5"       → 1.5   (vírgula decimal BR)
//   "1.5"       → 1.5   (ponto decimal EN, hábito de teclado)
//   "1.234,56"  → 1234.56 (milhar BR + decimal)
//   "1.234.567" → 1234567 (milhar BR sem decimal)
//   "1.234"     → 1.234  (ambíguo: trata como decimal EN — safer)
//
// Algoritmo:
//   • Tem vírgula E ponto   → formato BR completo: remove pontos, troca vírgula
//   • Tem apenas vírgula    → decimal BR: troca vírgula por ponto
//   • Tem apenas ponto      → decimal EN ou inteiro: usa como está
//   • Nenhum               → inteiro: usa como está

function _parseLocaleStr(str) {
  let s = String(str ?? '').trim();
  const hasComma  = s.includes(',');
  const hasPeriod = s.includes('.');
  if (hasComma && hasPeriod) {
    // "1.234,56" ou "1.234.567,8" → remove pontos de milhar, troca vírgula
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (hasComma) {
    // "1,5" → "1.5"
    s = s.replace(',', '.');
  }
  // caso só período ou nenhum: usar como está
  return s;
}

function parseLocaleFloat(str) {
  const n = parseFloat(_parseLocaleStr(str));
  return isNaN(n) ? 0 : n;
}

function parseLocaleFloatOrNull(str) {
  const s = String(str ?? '').trim();
  if (!s || s === '-') return null;
  const n = parseFloat(_parseLocaleStr(s));
  return isNaN(n) ? null : n;
}

// Retorna tipos disponíveis para um projeto (genéricos + packs ativos)
function getAvailableInstallTypes(project) {
  const packs = (project && project.packs) ? project.packs : [];
  return INSTALLATION_LIBRARY.filter(e => e.pack === null || packs.includes(e.pack));
}

// Busca entrada da biblioteca pelo id
function getInstallEntry(typeId) {
  return INSTALLATION_LIBRARY.find(e => e.id === typeId) || null;
}

// ── Default canvas state ──────────────────────

function defaultCanvas() {
  return {
    zoom:             0.15,    // px/mm (0.15 ≈ 1:50 em 1366px)
    panX:             200,
    panY:             200,
    gridVisible:      true,
    snapEnabled:      true,
    defaultPeDireito: null,    // m | null = herda default do projeto/não definido
    walls:         [],         // { id, x1, y1, x2, y2, thickness, label? }
    openings:      [],         // { id, type, wallId, position, width, height, sill, hingeSide, openDir, side }
    installations: [],         // { id, type, x, y, height(cm), observation, sequenceNumber, wallId?, wallT? }
    photoPins:     [],         // { id, x, y, photoData, sequenceNumber, annotations, caption }
    notes:         [],         // { id, x, y, text, environmentId? }
    dimensions:    [],         // { id, x1, y1, x2, y2, value, offset, wallId?, label? }
    environments:  [],         // { id, name, polygon, peDireito, observation, color? }
    backgroundImage: null,     // { data, x, y, scale, opacity, rotation, calibrationPoints? }
    elevations:    [],         // { id, wallId, name, environmentId?, showDimensions, showInstallations }
  };
}

// ── Factories de entidades ────────────────────
// Criam objetos novos com todos os defaults corretos.
// Canvas-editor chama estas funções — nunca monta o objeto inline.

// Cria uma nova instalação com height pré-preenchido da INSTALLATION_LIBRARY.
// height é COPIADO para a instância (não referência ao tipo) — cada ponto
// é independentemente editável em campo ("aquela tomada está a 110cm, não 30cm").
function createInstallation(type, x, y, canvas) {
  const entry   = getInstallEntry(type);
  const symbol  = entry ? entry.symbol : type.slice(0, 3).toUpperCase();

  // sequenceNumber: próximo número para este símbolo no canvas atual
  const existing = (canvas.installations || []).filter(i => {
    const e = getInstallEntry(i.type);
    return (e ? e.symbol : i.type.slice(0, 3).toUpperCase()) === symbol;
  });

  return {
    id:             generateId(),
    type,
    x,
    y,
    height:         entry ? entry.defaultHeight : null, // CÓPIA do default — editável por instância
    observation:    '',
    sequenceNumber: existing.length + 1,
    wallId:         null,
    wallT:          null,
  };
}

// ── Normalizadores por entidade ───────────────
// Cada função garante que todos os campos existem com defaults seguros.
// Nunca remove campos desconhecidos (compatibilidade futura).

function normalizeWall(w) {
  return {
    id:        w.id        || generateId(),
    x1:        w.x1        || 0,
    y1:        w.y1        || 0,
    x2:        w.x2        || 0,
    y2:        w.y2        || 0,
    thickness: w.thickness || 150,
    label:     w.label     ?? null,
  };
}

function normalizeOpening(o) {
  return {
    id:        o.id        || generateId(),
    type:      o.type      || 'door',
    wallId:    o.wallId    || '',
    position:  o.position  ?? 0.5,
    width:     o.width     || 800,
    height:    o.height    ?? null,
    sill:      o.sill      ?? null,
    hingeSide: o.hingeSide || 'right',
    openDir:   o.openDir   || 'in',
    side:      o.side      || o.hingeSide || 'right',
  };
}

// Migração de IDs antigos (v0) para novos (v1)
const _OLD_TYPE_MAP = {
  tomada110:    'tomada_2pt',
  tomada220:    'tomada_alta',
  interruptor:  'interruptor_simples',
  luzTeto:      'luz_teto',
  luzParede:    'luz_parede',
  dados:        'ponto_dados',
  splitInterno: 'split_interno',
  splitExterno: 'split_externo',
  aguaFria:     'agua_fria',
  aguaQuente:   'agua_quente',
  ralo:         'ralo',
  esgoto:       'esgoto',
  gas:          'gas_ponto',
};

// Retorna true se o tipo existe na INSTALLATION_LIBRARY.
// Usado para distinguir tipos conhecidos de tipos desconhecidos/customizados.
function isKnownInstallType(type) {
  return INSTALLATION_LIBRARY.some(e => e.id === type);
}

function normalizeInstallation(inst) {
  // 1. Tentar migrar tipo antigo
  let type = _OLD_TYPE_MAP[inst.type] || inst.type;

  // 2. Tipo null/undefined/vazio → fallback genérico
  if (!type) type = 'tomada_2pt';

  // 3. Tipo desconhecido (não está no mapa antigo nem na biblioteca):
  //    PRESERVAR o tipo original — a instalação não desaparece.
  //    Renderiza com código fallback (primeiras 3 letras em maiúsculas).
  //    Razão: pode ser um tipo customizado de outro dispositivo, ou um tipo
  //    que será adicionado à biblioteca no futuro. Silenciosamente mudar para
  //    'tomada_2pt' seria pior (perderia a intenção do levantamento).

  return {
    id:             inst.id             || generateId(),
    type,
    x:              inst.x              || 0,
    y:              inst.y              || 0,
    height:         inst.height         ?? null,
    observation:    inst.observation    ?? '',
    sequenceNumber: inst.sequenceNumber ?? 1,
    wallId:         inst.wallId         ?? null,
    wallT:          inst.wallT          ?? null,
  };
}

function normalizePhotoPin(p) {
  return {
    id:             p.id             || generateId(),
    x:              p.x              || 0,
    y:              p.y              || 0,
    photoData:      p.photoData      ?? null,
    sequenceNumber: p.sequenceNumber ?? 1,
    annotations:    Array.isArray(p.annotations) ? p.annotations : [],
    caption:        p.caption        ?? '',
  };
}

function normalizeNote(n) {
  return {
    id:            n.id            || generateId(),
    x:             n.x             || 0,
    y:             n.y             || 0,
    text:          n.text          ?? '',
    environmentId: n.environmentId ?? null,
  };
}

function normalizeDimension(d) {
  return {
    id:     d.id     || generateId(),
    x1:     d.x1     || 0,
    y1:     d.y1     || 0,
    x2:     d.x2     || 0,
    y2:     d.y2     || 0,
    value:  d.value  ?? null,   // null = calculado de dist(x1,y1,x2,y2)
    offset: d.offset ?? 400,   // mm
    wallId: d.wallId ?? null,
    label:  d.label  ?? null,
  };
}

function normalizeEnvironment(e) {
  // centroid e area são calculados no render — NÃO persistir
  return {
    id:          e.id          || generateId(),
    name:        e.name        || 'Ambiente',
    polygon:     Array.isArray(e.polygon) ? e.polygon : [],
    peDireito:   e.peDireito   ?? null,   // m | null = herda defaultPeDireito
    observation: e.observation ?? '',
    color:       e.color       ?? null,
  };
}

function normalizeElevation(ev) {
  return {
    id:                ev.id                || generateId(),
    wallId:            ev.wallId            || '',
    name:              ev.name              || 'Elevação',
    environmentId:     ev.environmentId     ?? null,
    showDimensions:    ev.showDimensions    ?? true,
    showInstallations: ev.showInstallations ?? true,
  };
}

function normalizeBackgroundImage(bg) {
  if (!bg) return null;
  return {
    data:               bg.data               ?? null,
    x:                  bg.x                  || 0,
    y:                  bg.y                  || 0,
    scale:              bg.scale              || 10,
    opacity:            bg.opacity            ?? 0.3,
    rotation:           bg.rotation           ?? 0,
    calibrationPoints:  bg.calibrationPoints  ?? null,
  };
}

function normalizeCanvas(c) {
  if (!c || typeof c !== 'object') c = {};
  const def = defaultCanvas();
  return {
    zoom:             c.zoom             ?? def.zoom,
    panX:             c.panX             ?? def.panX,
    panY:             c.panY             ?? def.panY,
    gridVisible:      c.gridVisible      ?? def.gridVisible,
    snapEnabled:      c.snapEnabled      ?? def.snapEnabled,
    defaultPeDireito: c.defaultPeDireito ?? null,
    walls:            (c.walls         || []).map(normalizeWall),
    openings:         (c.openings      || []).map(normalizeOpening),
    installations:    (c.installations || []).map(normalizeInstallation),
    photoPins:        (c.photoPins     || []).map(normalizePhotoPin),
    notes:            (c.notes         || []).map(normalizeNote),
    dimensions:       (c.dimensions    || []).map(normalizeDimension),
    environments:     (c.environments  || []).map(normalizeEnvironment),
    backgroundImage:  normalizeBackgroundImage(c.backgroundImage),
    elevations:       (c.elevations    || []).map(normalizeElevation),
  };
}

// ── Schema migration ──────────────────────────
// Migra projetos antigos e garante que todos os campos existam.
// Regras:
//   1. Nunca remove campos desconhecidos (retrocompatibilidade futura)
//   2. Migração v0→v1 (single-floor → multi-floor) ocorre na Fase 3
//   3. Aplica-se em leitura (lazy) — Storage.get/getList — e no save

function normalizeProject(p) {
  if (!p || typeof p !== 'object') return p;

  // Garantir campos raiz
  if (!Array.isArray(p.photos)) p.photos = [];
  if (!Array.isArray(p.packs))  p.packs  = [];

  // ── Migração Fase 3 (multi-pavimento) ──────
  // Quando p.floors existir, migrar p.canvas para floors[0].
  // Por enquanto (Fase 1/2) o app ainda usa p.canvas diretamente.
  // Este bloco já está aqui para quando a Fase 3 for implementada:
  //
  // if (p.canvas && !p.floors) {
  //   const floorId = generateId();
  //   p.floors = [{ id: floorId, name: 'Térreo', level: 0, canvas: p.canvas }];
  //   p.activeFloorId = floorId;
  //   delete p.canvas;
  //   p.schemaVersion = SCHEMA_VERSION;
  // }

  // Normalizar canvas (Fase 1/2)
  p.canvas = normalizeCanvas(p.canvas);

  p.schemaVersion = SCHEMA_VERSION;
  return p;
}

// ── Project Factory ───────────────────────────

function createProject(name, client, address) {
  const now = new Date().toISOString();
  return {
    id:            generateId(),
    schemaVersion: SCHEMA_VERSION,
    name:          name.trim(),
    client:        client.trim(),
    address:       address.trim(),
    createdAt:     now,
    updatedAt:     now,
    thumbnail:     null,
    packs:         [],
    canvas:        defaultCanvas(),
    photos:        [],
  };
}

// ── ImageStore — IndexedDB para binários pesados ──────────────
// Fotos (photoPins[].photoData) e imagem de fundo (backgroundImage.data)
// ficam no IndexedDB (sem limite de 5 MB). O localStorage guarda apenas
// os metadados do projeto e referências (_photoRef / _dataRef).
//
// Fluxo de ESCRITA (Storage.save — async):
//   1. ImageStore.extractAndSave(project) → persiste imagens no IndexedDB
//      e AGUARDA confirmação (await) antes de qualquer outra coisa.
//   2. Só após confirmação: _stripImages(project) → clona sem base64.
//   3. O projeto "leve" vai pro localStorage.
//   Fallback: se IndexedDB falhar, o base64 permanece inline no localStorage
//   naquele save (projeto pesado, mas sem perda de dados).
//
// Fluxo de LEITURA (Storage.get + hydrateAsync):
//   1. Storage.get(id) → carrega do localStorage, devolve projeto com
//      photoData = null (mas _photoRef preenchido) — SÍNCRONO
//   2. Storage.hydrateAsync(project) → preenche photoData de volta do
//      IndexedDB — ASSÍNCRONO, chamado pelo canvas-editor após open()
//
// Compatibilidade retroativa:
//   Projetos antigos têm photoData como string base64 diretamente no
//   localStorage. Na próxima save() eles são migrados para IndexedDB
//   automaticamente. Até lá, o get() os devolve com photoData preenchido.

const ImageStore = {
  _DB_NAME:    'elle_levantamento_images',
  _DB_VERSION: 1,
  _STORE:      'images',
  _db:         null,

  _open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this._DB_NAME, this._DB_VERSION);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore(this._STORE, { keyPath: 'id' });
      };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror   = e => reject(e.target.error);
    });
  },

  async put(id, dataUrl) {
    const db = await this._open();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(this._STORE, 'readwrite');
      tx.objectStore(this._STORE).put({ id, dataUrl });
      tx.oncomplete = resolve;
      tx.onerror    = e => reject(e.target.error);
    });
  },

  async get(id) {
    if (!id) return null;
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const req = db.transaction(this._STORE, 'readonly')
                      .objectStore(this._STORE).get(id);
        req.onsuccess = e => resolve(e.target.result ? e.target.result.dataUrl : null);
        req.onerror   = e => reject(e.target.error);
      });
    } catch {
      return null;
    }
  },

  async del(id) {
    if (!id) return;
    try {
      const db = await this._open();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(this._STORE, 'readwrite');
        tx.objectStore(this._STORE).delete(id);
        tx.oncomplete = resolve;
        tx.onerror    = e => reject(e.target.error);
      });
    } catch { /* ignore */ }
  },

  // Recebe o projeto EM MEMÓRIA (com base64 intacto).
  // Salva cada imagem no IndexedDB e retorna um mapa de refs.
  async extractAndSave(project) {
    const saves = [];
    const c = project.canvas;
    if (!c) return;

    for (const pin of (c.photoPins || [])) {
      if (pin.photoData && typeof pin.photoData === 'string' && pin.photoData.startsWith('data:')) {
        const ref = `img_${pin.id}`;
        saves.push(this.put(ref, pin.photoData));
      }
    }

    const bg = c.backgroundImage;
    if (bg && bg.data && typeof bg.data === 'string' && bg.data.startsWith('data:')) {
      const ref = `bg_${project.id}`;
      saves.push(this.put(ref, bg.data));
    }

    if (saves.length) await Promise.all(saves);
  },

  // Recarrega as imagens de volta no projeto (vindo do localStorage).
  // Chame após Storage.get() quando precisar exibir fotos.
  async loadImages(project) {
    const c = project.canvas;
    if (!c) return project;
    const loads = [];

    for (const pin of (c.photoPins || [])) {
      if (!pin.photoData && pin._photoRef) {
        loads.push(this.get(pin._photoRef).then(d => { pin.photoData = d; }));
      }
    }

    const bg = c.backgroundImage;
    if (bg && !bg.data && bg._dataRef) {
      loads.push(this.get(bg._dataRef).then(d => { bg.data = d; }));
    }

    if (loads.length) await Promise.all(loads);
    return project;
  },

  // Remove imagens do IndexedDB que não são mais referenciadas por nenhum projeto.
  async gc() {
    try {
      const all      = Storage.getAll();
      const usedRefs = new Set();
      for (const p of Object.values(all)) {
        for (const pin of (p.canvas?.photoPins || [])) {
          if (pin._photoRef) usedRefs.add(pin._photoRef);
        }
        const bgRef = p.canvas?.backgroundImage?._dataRef;
        if (bgRef) usedRefs.add(bgRef);
      }
      const db = await this._open();
      const keys = await new Promise((res, rej) => {
        const req = db.transaction(this._STORE, 'readonly').objectStore(this._STORE).getAllKeys();
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
      });
      const orphans = keys.filter(k => !usedRefs.has(k));
      await Promise.all(orphans.map(k => this.del(k)));
      return orphans.length;
    } catch {
      return 0;
    }
  },
};

// ── Storage API ───────────────────────────────

const Storage = {
  getAll() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch {
      return {};
    }
  },

  getList() {
    return Object.values(this.getAll())
      .map(normalizeProject)
      .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  },

  get(id) {
    const p = this.getAll()[id];
    return p ? normalizeProject(p) : null;
  },

  // Recarrega imagens pesadas do IndexedDB para o projeto (assíncrono).
  // Chamar após get() quando o canvas precisar exibir fotos.
  // Retorna Promise<project> com photoData e backgroundImage.data preenchidos.
  hydrateAsync(project) {
    return ImageStore.loadImages(project);
  },

  // Copia o projeto sem os binários pesados (base64).
  // Adiciona refs (_photoRef / _dataRef) para o IndexedDB.
  // Operação SÍNCRONA — não depende de I/O.
  _stripImages(project) {
    const p = JSON.parse(JSON.stringify(project));
    const c = p.canvas;
    if (!c) return p;

    for (const pin of (c.photoPins || [])) {
      if (pin.photoData && typeof pin.photoData === 'string' && pin.photoData.startsWith('data:')) {
        pin._photoRef = `img_${pin.id}`;
        pin.photoData = null;
      }
      // Retrocompat: se já estava em base64 curta (<200 chars = ícone SVG ou similar), mantém
    }

    const bg = c.backgroundImage;
    if (bg && bg.data && typeof bg.data === 'string' && bg.data.startsWith('data:')) {
      bg._dataRef = `bg_${project.id}`;
      bg.data     = null;
    }

    return p;
  },

  async save(project) {
    project.updatedAt = new Date().toISOString();

    // 1. Persistir imagens no IndexedDB PRIMEIRO e AGUARDAR confirmação.
    //    Só removemos o base64 do localStorage depois que o IndexedDB confirmar.
    //    Se o IndexedDB falhar, o base64 permanece inline (fallback seguro —
    //    o projeto fica pesado, mas nenhuma foto é perdida em silêncio).
    let liteProject;
    try {
      await ImageStore.extractAndSave(project);
      liteProject = this._stripImages(project);   // clona sem base64
    } catch (idbErr) {
      console.warn('ImageStore: gravação no IndexedDB falhou, mantendo base64 inline:', idbErr);
      liteProject = JSON.parse(JSON.stringify(project)); // clone completo, com base64
    }
    liteProject.updatedAt = project.updatedAt;

    // 2. Salvar projeto no localStorage (leve se IndexedDB ok; pesado se fallback)
    const all = this.getAll();
    all[liteProject.id] = liteProject;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    } catch (e) {
      console.warn('Storage quota exceeded:', e);
      return { error: 'quota', message: 'Espaço insuficiente. Exclua fotos antigas antes de continuar.' };
    }

    return project;  // devolve o projeto ORIGINAL (com base64 em memória)
  },

  delete(id) {
    const all = this.getAll();
    delete all[id];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  },

  storageUsedKb() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY) || '';
      return Math.round(raw.length / 1024);
    } catch {
      return 0;
    }
  },

  // Quota restante estimada em KB (heurística — localStorage máx ~5MB)
  storageRemainingKb() {
    const used = this.storageUsedKb();
    return Math.max(0, 5120 - used);
  },

  // PERSISTÊNCIA DO ARMAZENAMENTO (Chrome/Android e iOS)
  // Solicita ao navegador que não despeje o IndexedDB sob pressão de espaço.
  // No Chrome (Android): concede por engajamento/uso — muito provável em app
  //   instalado via "Adicionar à tela inicial". Sem essa chamada, o armazenamento
  //   é "best-effort" e pode ser removido pelo sistema em condições extremas.
  // No Safari (iOS): mais restritivo, mas a chamada é harmless — o user-agent
  //   pode conceder se o site estiver nos favoritos ou instalado como PWA.
  // Seguro chamar mesmo em browsers sem suporte: a checagem de typeof protege.
  async requestPersistentStorage() {
    if (typeof navigator === 'undefined') return false;
    const sm = navigator.storage;
    if (!sm || typeof sm.persist !== 'function') return false;
    try {
      const granted = await sm.persist();
      console.info('[Elle] Armazenamento persistente:', granted ? 'concedido ✓' : 'não concedido (best-effort)');
      return granted;
    } catch (e) {
      console.warn('[Elle] navigator.storage.persist() falhou:', e);
      return false;
    }
  },
};

// ── Geometry helpers ──────────────────────────

function polygonArea(pts) {
  let area = 0;
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    area += pts[i].x * pts[j].y;
    area -= pts[j].x * pts[i].y;
  }
  return Math.abs(area) / 2;
}

function polygonCentroid(pts) {
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  return { x: cx / pts.length, y: cy / pts.length };
}

// Comprimento de segmento (mm)
function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

// Projeta ponto P no segmento AB; retorna { t: fração 0..1, d: distância ao segmento }
function projectPointOnSegment(P, A, B) {
  const dx = B.x - A.x, dy = B.y - A.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { t: 0, d: dist(P.x, P.y, A.x, A.y) };
  const t = Math.max(0, Math.min(1, ((P.x - A.x) * dx + (P.y - A.y) * dy) / lenSq));
  const cx = A.x + t * dx, cy = A.y + t * dy;
  return { t, d: dist(P.x, P.y, cx, cy) };
}

function pointNearSegment(P, A, B, radius) {
  return projectPointOnSegment(P, A, B).d <= radius;
}

function pointInPolygon(pt, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    if (((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// Sanitiza string para uso em HTML (previne XSS)
function esc(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Formata mm → "X,XXm" — sempre metros, 2 casas decimais, vírgula PT-BR
function fmtMm(mm) {
  if (mm == null) return '—';
  return (mm / 1000).toFixed(2).replace('.', ',') + 'm';
}

// Formata m² (área em mm²) para exibição
function fmtM2(mm2) {
  if (mm2 == null) return '—';
  return `${(mm2 / 1e6).toFixed(2)} m²`;
}


/* ─── dxf-writer.js ─── */
/* ═══════════════════════════════════════════
   Elle Levantamento — DXF Writer
   Gera DXF ASCII 2D — AutoCAD R2000 (AC1015)
   Unidades: milímetros (INSUNITS=4)
   ═══════════════════════════════════════════ */

const DxfWriter = {

  generate(project) {
    const c = project.canvas;
    const L = [];

    const bbox = this._calcBbox(c);

    this._header(L, bbox);
    this._tables(L, c);
    this._entities(L, c);
    L.push('0', 'EOF');

    return L.join('\r\n');
  },

  // ── Bounding box dinâmica ────────────────────
  // Evita o bug de "planta minúscula ao abrir" causado pelo extents hardcoded.

  _calcBbox(c) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    const add = (x, y) => {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    };
    for (const w of (c.walls || []))         { add(w.x1, w.y1); add(w.x2, w.y2); }
    for (const i of (c.installations || [])) { add(i.x, i.y); }
    for (const n of (c.notes || []))         { add(n.x, n.y); }
    for (const p of (c.photoPins || []))     { add(p.x, p.y); }
    for (const e of (c.environments || []))  { for (const pt of (e.polygon || [])) add(pt.x, pt.y); }
    if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 50000; maxY = 50000; }
    const pad = 1000;
    return { minX: minX - pad, minY: minY - pad, maxX: maxX + pad, maxY: maxY + pad };
  },

  // ── Header ───────────────────────────────────

  _header(L, bbox) {
    L.push(
      '0', 'SECTION', '2', 'HEADER',
      '9', '$ACADVER',    '1', 'AC1009',  // R12 — compatível com todas as versões
      '9', '$INSUNITS',   '70', '4',      // mm
      '9', '$MEASUREMENT','70', '1',      // metric
      '9', '$EXTMIN',
        '10', bbox.minX.toFixed(1),
        '20', (-bbox.maxY).toFixed(1),
        '30', '0',
      '9', '$EXTMAX',
        '10', bbox.maxX.toFixed(1),
        '20', (-bbox.minY).toFixed(1),
        '30', '0',
      '0', 'ENDSEC'
    );
  },

  // ── Tables (layer definitions) ───────────────
  // Layers separadas para elétrica, hidráulica, odonto, notas e fotos.

  _tables(L, c) {
    // Determinar se há instalações odonto no canvas
    const hasOdonto = (c.installations || []).some(i => {
      const e = getInstallEntry(i.type);
      return e && e.pack === 'odonto';
    });

    const layers = [
      ['PAREDES',    7, 'CONTINUOUS'],
      ['ABERTURAS',  3, 'CONTINUOUS'],
      ['ELETRICA',   2, 'CONTINUOUS'],
      ['HIDRAULICA', 5, 'CONTINUOUS'],
      ['COTAS',      1, 'CONTINUOUS'],
      ['AMBIENTES',  4, 'CONTINUOUS'],
      ['NOTAS',      6, 'CONTINUOUS'],   // separado de FOTOS
      ['FOTOS',      6, 'CONTINUOUS'],   // separado de NOTAS
    ];

    if (hasOdonto) layers.push(['ODONTO', 3, 'CONTINUOUS']);

    L.push(
      '0', 'SECTION', '2', 'TABLES',
      '0', 'TABLE', '2', 'LTYPE', '70', '1',
      '0', 'LTYPE', '2', 'CONTINUOUS', '70', '0', '3', 'Solid line', '72', '65', '73', '0', '40', '0',
      '0', 'ENDTAB',
      '0', 'TABLE', '2', 'LAYER', '70', String(layers.length)
    );

    for (const [name, color, ltype] of layers) {
      L.push('0', 'LAYER', '2', name, '70', '0', '62', String(color), '6', ltype);
    }

    L.push('0', 'ENDTAB', '0', 'ENDSEC');
  },

  // ── Entities ─────────────────────────────────

  _entities(L, c) {
    L.push('0', 'SECTION', '2', 'ENTITIES');

    this._writeWalls(L, c);
    this._writeOpenings(L, c);
    this._writeDimensions(L, c);
    this._writeEnvironments(L, c);
    this._writeInstallations(L, c);
    this._writeNotes(L, c);
    this._writePhotoPins(L, c);

    L.push('0', 'ENDSEC');
  },

  // ── Paredes ───────────────────────────────────

  _writeWalls(L, c) {
    const walls = c.walls || [];
    const openings = c.openings || [];
    const SNAP = 20; // tolerância de conexão em mm

    // Verifica se um endpoint conecta a outra parede
    const isConn = (w, px, py) =>
      walls.some(o => o !== w && (
        (Math.abs(o.x1 - px) < SNAP && Math.abs(o.y1 - py) < SNAP) ||
        (Math.abs(o.x2 - px) < SNAP && Math.abs(o.y2 - py) < SNAP)
      ));

    for (const w of walls) {
      const t = (w.thickness || 150) / 2;
      const dx = w.x2 - w.x1, dy = w.y2 - w.y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (!len) continue;
      const ux = dx / len, uy = dy / len; // unitário ao longo
      const nx = -uy * t, ny = ux * t;    // offset perpendicular

      // Aberturas desta parede — para cortar as linhas de face
      const wOpenings = openings
        .filter(o => o.wallId === w.id)
        .map(o => ({
          s: len * o.position - (o.width || 900) / 2,
          e: len * o.position + (o.width || 900) / 2,
        }))
        .sort((a, b) => a.s - b.s);

      // Desenha segmentos de uma face, pulando os vãos
      const drawFace = (ox, oy) => {
        let cur = 0;
        for (const vao of wOpenings) {
          if (vao.s > cur) {
            this._line(L, 'PAREDES',
              w.x1 + ux * cur + ox,  w.y1 + uy * cur + oy,
              w.x1 + ux * vao.s + ox, w.y1 + uy * vao.s + oy);
          }
          cur = vao.e;
        }
        if (cur < len) {
          this._line(L, 'PAREDES',
            w.x1 + ux * cur + ox, w.y1 + uy * cur + oy,
            w.x2 + ox, w.y2 + oy);
        }
      };

      drawFace( nx,  ny);
      drawFace(-nx, -ny);

      // Tampa no início: só se livre (não conecta a outra parede)
      if (!isConn(w, w.x1, w.y1))
        this._line(L, 'PAREDES', w.x1 + nx, w.y1 + ny, w.x1 - nx, w.y1 - ny);

      // Tampa no fim: só se livre
      if (!isConn(w, w.x2, w.y2))
        this._line(L, 'PAREDES', w.x2 + nx, w.y2 + ny, w.x2 - nx, w.y2 - ny);
    }
  },

  // ── Aberturas (porta/janela) ─────────────────
  // O arco de porta usa a mesma lógica geométrica do canvas-editor
  // via _doorGeometry() para garantir consistência entre o que o
  // usuário vê e o que sai no DXF.

  _writeOpenings(L, c) {
    for (const o of (c.openings || [])) {
      const w = (c.walls || []).find(w => w.id === o.wallId);
      if (!w) continue;
      const dx = w.x2 - w.x1, dy = w.y2 - w.y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (!len) continue;
      const nx = dx / len, ny = dy / len;
      const cx = w.x1 + dx * o.position;
      const cy = w.y1 + dy * o.position;
      const half = (o.width || 900) / 2;

      // Linha do vão (apaga a parede visualmente no canvas, representa o vão no DXF)
      this._line(L, 'ABERTURAS', cx - nx * half, cy - ny * half, cx + nx * half, cy + ny * half);

      if (o.type === 'door') {
        const geo = this._doorGeometry(cx, cy, nx, ny, o);
        this._arc(L, 'ABERTURAS', geo.hx, geo.hy, o.width || 900, geo.startDeg, geo.sweepDeg);
      } else {
        // Janela: 3 linhas perpendiculares à parede (representando o vidro)
        const t = (w.thickness || 150) / 2;
        const perpX = -ny, perpY = nx; // unitário perpendicular à parede
        for (const k of [-half * 0.5, 0, half * 0.5]) {
          const ox = cx + nx * k, oy = cy + ny * k;
          this._line(L, 'ABERTURAS',
            ox + perpX * t, oy + perpY * t,
            ox - perpX * t, oy - perpY * t
          );
        }
      }
    }
  },

  // Calcula geometria do arco de porta.
  // Compartilha a lógica com canvas-editor._drawSingleOpening para garantir
  // que o arco no DXF bate com o arco na tela.
  _doorGeometry(cx, cy, nx, ny, o) {
    const side     = (o.hingeSide === 'left' || o.side === 'left') ? 1 : -1;
    const half     = (o.width || 900) / 2;
    const hx       = cx - nx * half * side;
    const hy       = cy - ny * half * side;
    const openSide = (o.openDir === 'out') ? -side : side;
    const perpX    = -ny * openSide;
    const perpY    =  nx * openSide;
    // Ângulo no sistema canvas (Y↓); a inversão é tratada em _arc
    const startDeg = Math.atan2(perpY, perpX) * 180 / Math.PI;
    return { hx, hy, startDeg, sweepDeg: 90 };
  },

  // ── Dimensões (cotas) ─────────────────────────
  // Cotas como LINE + TEXT simples — compatível com qualquer leitor DXF.
  _writeDimensions(L, c) {
    for (const d of (c.dimensions || [])) {
      const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (!len) continue;
      const measuredMm = len;
      const val = (d.value != null) ? d.value : Math.round(measuredMm);
      const nx = dx / len, ny = dy / len;
      const perp = { x: -ny, y: nx };
      const off  = d.offset || 400;
      const p1   = { x: d.x1 + perp.x * off, y: d.y1 + perp.y * off };
      const p2   = { x: d.x2 + perp.x * off, y: d.y2 + perp.y * off };
      const mx   = (p1.x + p2.x) / 2;
      const my   = (p1.y + p2.y) / 2;
      const tick = 80;
      // Linha de cota + extensões + ticks
      this._line(L, 'COTAS', p1.x, p1.y, p2.x, p2.y);
      this._line(L, 'COTAS', d.x1, d.y1, p1.x, p1.y);
      this._line(L, 'COTAS', d.x2, d.y2, p2.x, p2.y);
      for (const pt of [p1, p2]) {
        this._line(L, 'COTAS',
          pt.x - nx * tick, pt.y - ny * tick,
          pt.x + nx * tick, pt.y + ny * tick);
      }
      // Texto
      this._text(L, 'COTAS', mx, my + 120, fmtMm(val), 200);
    }
  },

  // ── Ambientes ─────────────────────────────────

  _writeEnvironments(L, c) {
    for (const env of (c.environments || [])) {
      // Contorno do polígono
      if (env.polygon && env.polygon.length >= 3) {
        for (let i = 0; i < env.polygon.length; i++) {
          const a = env.polygon[i];
          const b = env.polygon[(i + 1) % env.polygon.length];
          this._line(L, 'AMBIENTES', a.x, a.y, b.x, b.y);
        }
      }
      // Labels no centroide (calculado aqui pois não é mais persistido)
      if (env.polygon && env.polygon.length >= 3) {
        const cen = polygonCentroid(env.polygon);
        this._text(L, 'AMBIENTES', cen.x, cen.y, env.name || 'Ambiente', 250);

        const area = polygonArea(env.polygon);
        if (area > 0) {
          const areaM2 = (area / 1e6).toFixed(2);
          this._text(L, 'AMBIENTES', cen.x, cen.y - 350, `${areaM2}m2`, 180);
        }
        if (env.peDireito) {
          this._text(L, 'AMBIENTES', cen.x, cen.y - 700, `pd=${env.peDireito}m`, 140);
        }
      }
    }
  },

  // ── Instalações ───────────────────────────────
  // Usa INSTALLATION_LIBRARY para símbolo e layer corretos.
  // Fallback para tipos legados não mapeados.

  _writeInstallations(L, c) {
    const r = 120;
    for (const inst of (c.installations || [])) {
      const entry  = getInstallEntry(inst.type);
      const layer  = entry ? entry.layerDXF : 'ELETRICA';
      const symbol = entry ? entry.symbol   : inst.type.slice(0, 3).toUpperCase();
      const code   = `${symbol}${inst.sequenceNumber}`;

      this._circle(L, layer, inst.x, inst.y, r);
      this._text(L, layer, inst.x - 80, inst.y - 80, code, 160);
      if (inst.height != null) {
        this._text(L, layer, inst.x - 80, inst.y - 300, `h=${inst.height}cm`, 120);
      }
    }
  },

  // ── Notas e Fotos em layers separadas ─────────

  _writeNotes(L, c) {
    for (const note of (c.notes || [])) {
      this._text(L, 'NOTAS', note.x, note.y, note.text, 180);
    }
  },

  _writePhotoPins(L, c) {
    for (const pin of (c.photoPins || [])) {
      this._circle(L, 'FOTOS', pin.x, pin.y, 100);
      this._text(L, 'FOTOS', pin.x - 60, pin.y - 60, `F${pin.sequenceNumber}`, 140);
      if (pin.caption) {
        this._text(L, 'FOTOS', pin.x - 60, pin.y - 280, pin.caption, 120);
      }
    }
  },

  // ── Primitivas DXF ────────────────────────────
  // Todas as coordenadas Y são invertidas (canvas Y-down → DXF Y-up).

  _line(L, layer, x1, y1, x2, y2) {
    L.push(
      '0', 'LINE', '8', layer,
      '10', x1.toFixed(1), '20', (-y1).toFixed(1), '30', '0',
      '11', x2.toFixed(1), '21', (-y2).toFixed(1), '31', '0'
    );
  },

  _circle(L, layer, cx, cy, r) {
    L.push(
      '0', 'CIRCLE', '8', layer,
      '10', cx.toFixed(1), '20', (-cy).toFixed(1), '30', '0',
      '40', r.toFixed(1)
    );
  },

  // startAngle e sweepAngle em graus, no espaço canvas (Y↓).
  // Converte para DXF (Y↑): espelha ângulos em torno do eixo X.
  _arc(L, layer, cx, cy, r, startAngle, sweepAngle) {
    // Espelhamento Y inverte sentido angular: canvas CCW → DXF CW
    // Para manter CCW no DXF: dxfStart = -(start+sweep), dxfEnd = -start
    const dxfStart = ((-startAngle - sweepAngle) % 360 + 360) % 360;
    const dxfEnd   = ((-startAngle)              % 360 + 360) % 360;
    L.push(
      '0', 'ARC', '8', layer,
      '10', cx.toFixed(1), '20', (-cy).toFixed(1), '30', '0',
      '40', r.toFixed(1),
      '50', dxfStart.toFixed(2),
      '51', dxfEnd.toFixed(2)
    );
  },

  _text(L, layer, x, y, text, height) {
    L.push(
      '0', 'TEXT', '8', layer,
      '10', x.toFixed(1), '20', (-y).toFixed(1), '30', '0',
      '40', height.toFixed(1),
      '1', String(text)
    );
  },

  // Entidade DIMENSION nativa DXF R2000 (AC1015) — tipo 1 = aligned linear.
  // n: índice 1-based para nomear o bloco anônimo (*D1, *D2, ...).
  //
  // Grupos de código usados:
  //   100 AcDbEntity + AcDbDimension + AcDbAlignedDimension
  //   2  → nome do bloco anônimo com a geometria visual (fallback)
  //   10/20 → ponto do texto (inserção, espaço DXF Y-up)
  //   11/21 → ponto do texto (coincide com 10/20 para aligned)
  //   70  → flags: 1 = aligned linear
  //   1   → texto sobreposto (vazio = auto); usa label se definido
  //   42  → medida real em mm (usada pelo AutoCAD para verificar texto sobreposto)
  //   13/23 → ponto de definição 1 (xdef1, espaço DXF)
  //   14/24 → ponto de definição 2 (xdef2, espaço DXF)
  _dimEntity(L, d, valueMm, n) {
    const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (!len) return;

    const off  = d.offset || 400;
    const nx = dx / len, ny = dy / len;
    const perp = { x: -ny, y: nx };

    // Pontos no espaço DXF (Y invertido: dxfY = -canvasY)
    const x1d  = d.x1,           y1d = -d.y1;
    const x2d  = d.x2,           y2d = -d.y2;
    const p1dx = d.x1 + perp.x * off, p1dy = -(d.y1 + perp.y * off);
    const p2dx = d.x2 + perp.x * off, p2dy = -(d.y2 + perp.y * off);
    const txd  = (p1dx + p2dx) / 2;   // midpoint da linha de cota (AutoCAD posiciona o texto)
    const tyd  = (p1dy + p2dy) / 2;

    const blockName = `*D${n}`;
    const labelText = d.label ? String(d.label) : '';   // vazio = AutoCAD usa a medida automática

    L.push(
      '0', 'DIMENSION',
      '100', 'AcDbEntity',
      '8',   'COTAS',
      '100', 'AcDbDimension',
      '2',   blockName,           // bloco anônimo com geometria visual (fallback)
      '10',  txd.toFixed(1), '20', tyd.toFixed(1), '30', '0',
      '11',  txd.toFixed(1), '21', tyd.toFixed(1), '31', '0',
      '70',  '1',                 // 1 = aligned linear
      '1',   labelText,           // texto sobreposto (vazio = usa 42 automaticamente)
      '42',  valueMm.toFixed(1),  // valor real em mm
      '100', 'AcDbAlignedDimension',
      '13',  x1d.toFixed(1), '23', y1d.toFixed(1), '33', '0',
      '14',  x2d.toFixed(1), '24', y2d.toFixed(1), '34', '0'
    );
  },

  // Seção BLOCKS — blocos anônimos com geometria visual das cotas.
  // Viewers que não processam a entidade DIMENSION usam o bloco como fallback.
  _blocks(L, c) {
    L.push('0', 'SECTION', '2', 'BLOCKS');
    // Blocos obrigatórios em AC1015
    L.push(
      '0', 'BLOCK', '8', '0', '2', '*Model_Space', '70', '0',
      '10', '0', '20', '0', '30', '0', '3', '*Model_Space', '1', '',
      '0', 'ENDBLK', '8', '0'
    );
    L.push(
      '0', 'BLOCK', '8', '0', '2', '*Paper_Space', '70', '0',
      '10', '0', '20', '0', '30', '0', '3', '*Paper_Space', '1', '',
      '0', 'ENDBLK', '8', '0'
    );
    L.push('0', 'ENDSEC');
  },

  // Bloco anônimo *Dn — contém a geometria visual (fallback) da cota n.
  // Mesmo algoritmo do antigo _dimension(), usando coordenadas relativas à origem do bloco.
  _dimBlock(L, d, valueMm, n) {
    const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (!len) return;

    const off  = d.offset || 400;
    const nx = dx / len, ny = dy / len;
    const perp = { x: -ny, y: nx };

    const p1 = { x: d.x1 + perp.x * off, y: d.y1 + perp.y * off };
    const p2 = { x: d.x2 + perp.x * off, y: d.y2 + perp.y * off };
    const mx  = (p1.x + p2.x) / 2 + perp.x * 100;
    const my  = (p1.y + p2.y) / 2 + perp.y * 100;
    const labelText = d.label || fmtMm(valueMm);
    const tick = 80;

    L.push(
      '0', 'BLOCK',
      '2',   `*D${n}`,
      '70',  '4',    // 4 = anonymous block (flag)
      '10',  '0', '20', '0', '30', '0',
      '3',   '', '1', ''
    );

    // Linha de cota
    this._line(L, 'COTAS', p1.x, p1.y, p2.x, p2.y);
    // Linhas de extensão
    this._line(L, 'COTAS', d.x1, d.y1, p1.x, p1.y);
    this._line(L, 'COTAS', d.x2, d.y2, p2.x, p2.y);
    // Ticks
    for (const pt of [p1, p2]) {
      this._line(L, 'COTAS',
        pt.x - perp.x * tick, pt.y - perp.y * tick,
        pt.x + perp.x * tick, pt.y + perp.y * tick
      );
    }
    // Texto
    this._text(L, 'COTAS', mx, my, labelText, 200);

    L.push('0', 'ENDBLK');
  },

  // ── Export ────────────────────────────────────

  download(project) {
    const dxf  = this.generate(project);
    const blob = new Blob([dxf], { type: 'application/dxf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${project.name.replace(/[^\w\s\-]/gi, '').replace(/\s+/g, '_')}_levantamento.dxf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },
};


/* ─── canvas-editor.js ─── */
/* ═══════════════════════════════════════════
   Elle Levantamento — Canvas Editor (Módulo 2)
   Ferramentas: parede, cota, abertura, instalação, foto, nota
   Coordenadas internas: milímetros
   ═══════════════════════════════════════════ */

const CanvasEditor = {

  // ── State ─────────────────────────────────

  project: null,
  canvas:  null,
  ctx:     null,

  zoom:  0.15,   // px / mm
  panX:  200,
  panY:  200,

  currentTool: 'wall',
  drawStart:   null,   // first click in a two-click tool
  mouseWorld:  { x: 0, y: 0 },

  selected: null,  // { type: 'wall'|'dim'|'inst'|'note', id }

  isPanning:    false,
  panStart:     null,

  // Touch tracking
  _touchMoved:    false,
  _touchStartPos: null,

  // Environment polygon in progress
  envPoints: [],

  // Parede guiada (cadeia de pontos do contorno em desenho)
  _chainPts:   null,   // [{x,y}] ou null
  _aiming:     false,  // arrastando para definir a direção
  _aimAngle:   null,   // ângulo travado durante o arraste
  _aimClosing: false,  // mira está fechando no 1º ponto
  _snapBadge:  null,   // string do ângulo travado exibida no preview (C-07)
  _archSnapPt: null,   // ponto arquitetônico capturado pelo snap magnético de cota
  _wallSnapPt: null,   // endpoint de parede capturado pelo snap magnético de parede

  // Inserção de porta/janela arrastando até a parede
  _placingOpening: null,  // { type, wallId, position, cx, cy } | null
  _aimingOpening:  false,
  _openingPreview: null,  // abertura em edição (prévia ao vivo no formulário)

  // Inserção de instalação arrastando até a parede (igual à abertura)
  _placingInstall: null,  // { wallId, wallT, refX, refY } | null
  _aimingInstall:  false,
  _installPreview: null,  // { x, y, type } para prévia ao vivo

  // Scale calibration state: null | { p1: {x,y} }
  _scaleTool: null,

  // Cached background image element
  _bgImg: null,

  history:      [],
  historyIdx:   -1,

  _saveTimer:   null,
  _saveState:   'saved',
  _autoInterval: null,
  _keyHandler:        null,
  _resizeHandler:     null,
  _visibilityHandler: null,
  _hydratePromise:    null,   // Promise de hidratação das imagens do IndexedDB

  // ── Open ──────────────────────────────────

  open(projectId) {
    const p = Storage.get(projectId);
    if (!p) { App.navigate('/'); return; }

    this.project = p;
    this.zoom    = p.canvas.zoom  || 0.15;
    this.panX    = p.canvas.panX  || 200;
    this.panY    = p.canvas.panY  || 200;
    // Snapshot inicial vazio — primeiro undo volta ao estado antes de qualquer ação
    this.history    = [JSON.stringify(p.canvas)];
    this.historyIdx = 0;
    this.drawStart  = null;
    this.selected   = null;
    this.envPoints  = [];
    this._scaleTool = null;
    this._bgImg     = null;

    this._renderShell();
    this._initCanvas();
    this._initKeyboard();
    this._startAutoSave();
    this._initVisibility();
    // Ferramenta inicial — DEPOIS de _initCanvas (precisa de this.canvas).
    this._setTool('wall');
    this._updateUndoRedo();

    // Show calibrate button if project already has a background image
    if (this.project.canvas.backgroundImage) {
      const btn = document.getElementById('btn-calib');
      if (btn) btn.style.display = '';
    }

    // Iniciar hidratação das imagens do IndexedDB em background.
    // _hydratePromise é aguardado pelo export de PDF antes de montar o relatório.
    this._hydratePromise = Storage.hydrateAsync(this.project)
      .then(() => this._draw())
      .catch(err => console.warn('[Elle] hydrateAsync falhou:', err));
  },

  // ── Shell HTML ────────────────────────────

  _renderShell() {
    document.getElementById('app').innerHTML = `
      <div class="canvas-editor">

        <header class="editor-header">
          <button class="btn-ghost" id="btn-back" style="padding:6px 11px; font-size:12px;">
            ${this._ic('chevron-left')} Projetos
          </button>
          <div class="editor-project-info">
            <div class="editor-project-name">${esc(this.project.name)}</div>
            ${this.project.client
              ? `<div class="editor-project-sub">${esc(this.project.client)}</div>`
              : ''}
          </div>
          <div class="save-indicator">
            <div class="save-dot" id="save-dot"></div>
            <span id="save-label">Salvo</span>
          </div>
          <div style="display:flex;gap:6px;margin-left:10px;">
            <button class="btn-ghost" id="btn-undo" style="padding:6px 10px;" title="Desfazer (Ctrl+Z)">
              ${this._ic('undo')}
            </button>
            <button class="btn-ghost" id="btn-redo" style="padding:6px 10px;opacity:0.35;" title="Refazer (Ctrl+Y)" disabled>
              ${this._ic('redo')}
            </button>
            <button class="btn-ghost" id="btn-dxf" style="padding:6px 11px; font-size:12px;">
              ${this._ic('download')} DXF
            </button>
            <button class="btn-ghost" id="btn-pdf" style="padding:6px 11px; font-size:12px;">
              ${this._ic('pdf')} PDF
            </button>
          </div>
        </header>

        <div class="editor-toolbar" id="toolbar">
          <div class="tool-group">
            ${this._toolBtn('select',      this._ic('cursor'),  'Selecionar')}
            ${this._toolBtn('wall',        this._ic('wall'),    'Parede')}
            ${this._toolBtn('dimension',   this._ic('dim'),     'Cota')}
          </div>
          <div class="tool-sep"></div>
          <div class="tool-group">
            ${this._toolBtn('door',        this._ic('door'),    'Porta')}
            ${this._toolBtn('window',      this._ic('window'),  'Janela')}
          </div>
          <div class="tool-sep"></div>
          <div class="tool-group">
            ${this._toolBtn('install',     this._ic('bolt'),    'Instalação')}
            ${this._toolBtn('photo',       this._ic('camera'),  'Foto')}
            ${this._toolBtn('note',        this._ic('note'),    'Nota')}
            ${this._toolBtn('environment', this._ic('env'),     'Ambiente')}
          </div>
          <div style="flex:1;"></div>
          <div class="tool-group">
            <button class="tool-btn" id="btn-grid" title="Grade/Snap">
              ${this._ic('grid')} Grade
            </button>
            <button class="tool-btn" id="btn-bg" title="Importar imagem de fundo">
              ${this._ic('img')} Fundo
            </button>
            <button class="tool-btn" id="btn-calib"
              style="display:none; color:var(--blue); border-color:rgba(91,155,213,0.3);"
              title="Calibrar escala da imagem de fundo">
              ${this._ic('ruler2')} Calibrar
            </button>
            <button class="tool-btn" id="btn-close-env"
              style="display:none; color:var(--green); border-color:rgba(90,154,112,0.3);"
              title="Fechar ambiente">
              ${this._ic('check')} Fechar
            </button>
            <button class="tool-btn" id="btn-cancel-tool"
              style="display:none; color:var(--red); border-color:rgba(192,80,80,0.3);"
              title="Cancelar (Esc)">
              ${this._ic('x')} Cancelar

        <div class="editor-body" id="editor-body">

              1. Toque numa ferramenta acima<br>
              2. Toque na planta → desenha<br>
              &nbsp;&nbsp;<em>Parede/Cota: 2 toques</em><br><br>
              <strong style="color:var(--text-muted);">Mover/Zoom:</strong><br>
              2 dedos: mover e zoom<br><br>
              <strong style="color:var(--text-muted);">Selecionar:</strong><br>

            <button class="hud-nav-btn" id="btn-zoom-out" title="Diminuir zoom">−</button>
            <button class="hud-nav-btn" id="btn-zoom-in"  title="Aumentar zoom">+</button>
            <button class="hud-nav-btn" id="btn-fit" title="Centralizar / encaixar na tela">
              ${this._ic('fit')}
            </button>

          <!-- Ações sempre visíveis durante o desenho de paredes -->
          <div class="wall-actions" id="wall-actions" style="display:none;">
            <button class="wall-act-btn" id="btn-wall-undo">↶ Desfazer ponto</button>
            <button class="wall-act-btn wall-act-done" id="btn-wall-done">✓ Concluir</button>
          </div>
        </div>

      </div>
    `;

    document.getElementById('btn-back').addEventListener('click', async () => {
      await this._saveNow();   // garante que IndexedDB confirmou antes de sair
      this.destroy();
      App.navigate('/');
    });
    document.getElementById('btn-dxf').addEventListener('click', () => {
      this._saveNow();
      DxfWriter.download(this.project);
      Toast.show('DXF exportado', 'success');
    });
    document.getElementById('btn-pdf').addEventListener('click', async () => {
      // Aguardar hidratação — sem isso, fotos saem vazias se o PDF for gerado
      // logo após abrir o projeto (antes do IndexedDB ter carregado as imagens).
      if (this._hydratePromise) await this._hydratePromise;
      await this._saveNow();
      const dataUrl = this.canvas ? this.canvas.toDataURL('image/png') : null;
      PdfReport.generate(this.project, dataUrl);
    });
    document.getElementById('btn-bg').addEventListener('click', () => this._importBackground());
    document.getElementById('btn-calib').addEventListener('click', () => this._startScaleCalib());
    document.getElementById('btn-close-env').addEventListener('click', () => this._closeEnvironment());
    document.getElementById('btn-undo').addEventListener('click', () => this._undo());
    document.getElementById('btn-redo').addEventListener('click', () => this._redo());
    document.getElementById('btn-fit').addEventListener('click', () => this._fitScreen());
    document.getElementById('btn-zoom-in').addEventListener('click', () => this._zoomAtCenter(1.25));
    document.getElementById('btn-zoom-out').addEventListener('click', () => this._zoomAtCenter(1 / 1.25));
    document.getElementById('btn-wall-done').addEventListener('click', () => { this._resetWallChain(); this._draw(); });
    document.getElementById('btn-wall-undo').addEventListener('click', () => this._undoLastWallPoint());
    document.getElementById('btn-grid').addEventListener('click', () => {
      this.project.canvas.gridVisible = !this.project.canvas.gridVisible;
      this._draw();
    });
    document.getElementById('btn-cancel-tool').addEventListener('click', () => {
      if (this.currentTool === 'wall') this._resetWallChain();
      else { this.drawStart = null; this._updateCancelBtn(); }
      this._draw();
    });

    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => this._setTool(btn.dataset.tool));
    });
  },

  _toolBtn(id, icon, label) {
    return `<button class="tool-btn" data-tool="${id}" title="${label}">
      ${icon} ${label}
    </button>`;
  },

  // ── Canvas init ───────────────────────────

  _initCanvas() {
    this.canvas = document.getElementById('main-canvas');
    this.ctx    = this.canvas.getContext('2d');

    this._resize();
    this._resizeHandler = () => this._resize();
    window.addEventListener('resize', this._resizeHandler);
    window.addEventListener('orientationchange', this._resizeHandler);

    // O layout do flex pode não estar pronto na 1ª medição (comum em
    // navegadores de tablet). Re-mede no próximo frame e observa o body.
    requestAnimationFrame(() => this._resize());
    if (typeof ResizeObserver !== 'undefined') {
      const body = document.getElementById('editor-body');
      if (body) {
        this._ro = new ResizeObserver(() => this._resize());
        this._ro.observe(body);
      }
    }

    const c = this.canvas;
    c.addEventListener('mousedown',  e => this._onMouseDown(e));
    c.addEventListener('mousemove',  e => this._onMouseMove(e));
    c.addEventListener('mouseup',    e => this._onMouseUp(e));
    c.addEventListener('mouseleave', e => this._onMouseUp(e));
    c.addEventListener('wheel',      e => this._onWheel(e), { passive: false });
    c.addEventListener('dblclick',   e => this._onDblClick(e));
    c.addEventListener('touchstart', e => this._onTouchStart(e), { passive: false });
    c.addEventListener('touchmove',  e => this._onTouchMove(e), { passive: false });
    c.addEventListener('touchend',   e => this._onTouchEnd(e));

    this._draw();
  },

  _resize() {
    const body = document.getElementById('editor-body');
    if (!body || !this.canvas) return;
    const w = body.clientWidth;
    const h = body.clientHeight;
    // Layout ainda não pronto: não zera o buffer (canvas 0×0 = tela em branco).
    if (w === 0 || h === 0) {
      requestAnimationFrame(() => this._resize());
      return;
    }
    if (this.canvas.width !== w || this.canvas.height !== h) {
      this.canvas.width  = w;
      this.canvas.height = h;
    }
    this._draw();
  },

  // ── Tool management ───────────────────────

  _updateCancelBtn() {
    const btn = document.getElementById('btn-cancel-tool');
    if (btn) btn.style.display = this.drawStart ? '' : 'none';
  },

  _setTool(tool) {
    this.currentTool = tool;
    this.drawStart   = null;
    this.selected    = null;
    this.envPoints   = [];
    this._scaleTool  = null;
    this._chainPts   = null;
    this._aiming     = false;
    this._aimAngle   = null;
    this._aimClosing = false;
    this._placingOpening = null;
    this._aimingOpening  = false;
    this._openingPreview = null;
    this._placingInstall = null;
    this._aimingInstall  = false;
    this._installPreview = null;
    this._archSnapPt     = null;
    this._wallSnapPt     = null;
    this._updateCancelBtn();
    this._updateEnvBtn();
    this._updateWallActions();

    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tool === tool);
    });

    const hints = {
      select:      'Toque num elemento para selecionar · Toque fora para desselecionar',
      wall:        'Toque para marcar o início · arraste na direção e solte para digitar a medida (cm)',
      dimension:   'Toque no 1º ponto da cota · 2º toque finaliza a medida',
      door:        'Arraste até a parede onde fica a porta e solte (a parede acende)',
      window:      'Arraste até a parede onde fica a janela e solte (a parede acende)',
      install:     'Arraste até parede → modo parede · Toque no piso (centro do ambiente) → modo piso (X + Y)',
      photo:       'Toque na planta para tirar/vincular uma foto',
      note:        'Toque na planta para adicionar nota de texto',
      environment: 'Toque nos cantos do ambiente · Toque "Fechar" para concluir',
    };
    this._showHint(hints[tool] || '');
    this._updateCursor();
    this._draw();
  },

  _updateCursor() {
    const map = {
      select: 'default', wall: 'crosshair', dimension: 'crosshair',
      door: 'crosshair', window: 'crosshair', install: 'crosshair',
      photo: 'crosshair', note: 'text', environment: 'crosshair',
    };
    if (this.canvas) this.canvas.style.cursor = map[this.currentTool] || 'default';
  },

  _showHint(text) {
    const el = document.getElementById('hud-hint');
    if (!el) return;
    if (text) {
      el.textContent = text;
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  },

  // ── Coordinate transforms ─────────────────

  toWorld(px, py) {
    return { x: (px - this.panX) / this.zoom, y: (py - this.panY) / this.zoom };
  },

  toScreen(wx, wy) {
    return { x: wx * this.zoom + this.panX, y: wy * this.zoom + this.panY };
  },

  // ── Snapping ─────────────────────────────

  _snapWorld(raw, shiftLock = false) {
    let { x, y } = raw;

    // Snap to grid (10cm = 100mm steps)
    if (this.project.canvas.snapEnabled) {
      const g = 100;
      x = Math.round(x / g) * g;
      y = Math.round(y / g) * g;
    }

    // Snap to existing wall endpoints (8px radius in screen space)
    const r = 8 / this.zoom;
    for (const w of this.project.canvas.walls) {
      for (const pt of [{ x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 }]) {
        if (Math.abs(raw.x - pt.x) < r && Math.abs(raw.y - pt.y) < r) {
          return { x: pt.x, y: pt.y, snapped: true };
        }
      }
    }

    // Angle lock with Shift
    if (shiftLock && this.drawStart) {
      const dx = x - this.drawStart.x;
      const dy = y - this.drawStart.y;
      const angle = Math.atan2(dy, dx);
      const locked = Math.round(angle / (Math.PI / 4)) * (Math.PI / 4);
      const len = Math.sqrt(dx * dx + dy * dy);
      x = this.drawStart.x + Math.cos(locked) * len;
      y = this.drawStart.y + Math.sin(locked) * len;
    }

    return { x, y, snapped: false };
  },

  // ── Snap magnético para endpoints de parede ──────────────────────────────
  // Usado quando o usuário está prestes a marcar o início de uma nova parede.
  // Raio grande (24px) para uso com o dedo — evita paredes duplicadas no mesmo ponto.
  _snapToWallEndpoint(rawWorld) {
    const R = 24 / this.zoom;
    let best = null, bestD = Infinity;
    for (const w of this.project.canvas.walls) {
      for (const pt of [{ x: w.x1, y: w.y1 }, { x: w.x2, y: w.y2 }]) {
        const d = dist(rawWorld.x, rawWorld.y, pt.x, pt.y);
        if (d < R && d < bestD) { bestD = d; best = { x: pt.x, y: pt.y }; }
      }
    }
    return best;
  },

  // Indicador visual do snap de endpoint: círculo verde + ímã
  _drawWallSnap(ctx) {
    const pt = this._wallSnapPt;
    if (!pt) return;
    const r = 16 / this.zoom;

    // Halo externo
    ctx.strokeStyle = 'rgba(90,154,112,0.5)';
    ctx.lineWidth   = 1.5 / this.zoom;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, r * 1.7, 0, Math.PI * 2); ctx.stroke();

    // Anel sólido
    ctx.strokeStyle = '#5A9A70';
    ctx.lineWidth   = 2.5 / this.zoom;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2); ctx.stroke();

    // Cruz interna
    const c = r * 0.5;
    ctx.strokeStyle = '#5A9A70';
    ctx.lineWidth   = 2 / this.zoom;
    ctx.beginPath();
    ctx.moveTo(pt.x - c, pt.y); ctx.lineTo(pt.x + c, pt.y);
    ctx.moveTo(pt.x, pt.y - c); ctx.lineTo(pt.x, pt.y + c);
    ctx.stroke();

    // Label "Conectar" — badge preto + texto branco
    const fs  = 11 / this.zoom;
    const pad = 4  / this.zoom;
    ctx.font = `600 ${fs}px Inter,sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    const tw = ctx.measureText('Conectar').width;
    const bx = pt.x - tw / 2 - pad;
    const by = pt.y - r - fs - pad * 2 - 2 / this.zoom;
    ctx.fillStyle = 'rgba(10,30,18,0.92)'; // fundo escuro com tom verde
    ctx.beginPath();
    ctx.roundRect(bx, by, tw + pad * 2, fs + pad * 1.5, 3 / this.zoom);
    ctx.fill();
    ctx.fillStyle = '#5A9A70'; // verde igual ao círculo
    ctx.fillText('Conectar', pt.x, by + fs + pad * 0.75);
    ctx.textBaseline = 'alphabetic';
  },

  // ── Snap magnético para cotas ─────────────────────────────────────────────
